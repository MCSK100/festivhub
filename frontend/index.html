<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/festivlink-logo.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Core SEO Meta Tags -->
    <title>FestivLink - Premium Event Management & Service Provider Booking Platform</title>
    <meta name="description" content="Book top-rated event professionals - photographers, caterers, DJs, decorators & more. Verified vendors for weddings, corporate events & celebrations. 99.9% success rate.">
    <meta name="keywords" content="event management, wedding planner, photographer booking, catering services, DJ booking, event decorations, makeup artist, FestivLink, event planning platform">
    <meta name="author" content="FestivLink">
    <meta name="theme-color" content="#3B82F6">
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="FestivLink - Premium Event Management Platform">
    <meta property="og:description" content="Connect with verified event professionals. Book photographers, caterers, DJs & more for your perfect event. Simple, secure, reliable.">
    <meta property="og:image" content="/og-image.jpg">
    <meta property="og:url" content="https://festivlink.com">
    <meta property="og:site_name" content="FestivLink">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="FestivLink - Premium Event Management Platform">
    <meta name="twitter:description" content="Book verified event professionals for your celebrations. Photographers, caterers, DJs & more.">
    <meta name="twitter:image" content="/og-image.jpg">
    
    <!-- Additional SEO Meta Tags -->
    <meta name="robots" content="index, follow">
    <meta name="language" content="English">
    <meta name="revisit-after" content="7 days">
    <meta name="expires" content="never">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://festivlink.com">
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FestivLink",
      "url": "https://festivlink.com",
      "description": "Premium event management and service provider booking platform",
      "image": "/og-image.jpg",
      "sameAs": ["https://www.facebook.com/festivlink", "https://www.instagram.com/festivlink", "https://www.twitter.com/festivlink"],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-800-EVENTS",
        "contactType": "Customer Service"
      }
    }
    </script>
    
    <!-- Service Aggregator Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "FestivLink",
      "image": "/og-image.jpg",
      "description": "Event service aggregator connecting customers with verified professionals",
      "areaServed": "IN",
      "priceRange": "$$",
      "ratingValue": "4.9",
      "ratingCount": "5000",
      "reviewCount": "5000"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
